# ============================================================
# Notfall-QR – Nginx Reverse Proxy Konfiguration
# ============================================================
# Datei nach /etc/nginx/sites-available/notfall-qr kopieren
# und mit ln -s ... /etc/nginx/sites-enabled/ aktivieren.
# ============================================================

# Rate Limiting Zone
limit_req_zone $binary_remote_addr zone=notfallqr:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=notfallqr_api:10m rate=5r/s;

server {
    listen 80;
    server_name notfall-qr.example.com;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name notfall-qr.example.com;

    # --- SSL (Let's Encrypt / Certbot) ---
    ssl_certificate /etc/letsencrypt/live/notfall-qr.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notfall-qr.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Logging ---
    access_log /var/log/nginx/notfall-qr-access.log;
    error_log /var/log/nginx/notfall-qr-error.log;

    # --- Limits ---
    client_max_body_size 1M;

    # --- API Rate Limiting (strenger) ---
    location /api/ {
        limit_req zone=notfallqr_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Allgemein ---
    location / {
        limit_req zone=notfallqr burst=50 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Static Assets cachen ---
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
