# ============================================================
# Notfall-QR – Docker Compose (Produktion)
# ============================================================
# Verwendung:
#   1. cp .env.example .env && nano .env  (Werte anpassen!)
#   2. docker compose up -d
#   3. docker compose logs -f app
# ============================================================

services:
  # --- PostgreSQL Datenbank ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: notfallqr
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_DB: notfallqr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notfallqr"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Datenbank nicht nach außen exponieren
    # ports:
    #   - "5432:5432"

  # --- Next.js Anwendung ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://notfallqr:${DB_PASSWORD:-changeme_in_production}@db:5432/notfallqr?schema=public
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://notfall-qr.example.com}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-10}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET}
      NODE_ENV: production
    ports:
      - "3000:3000"

  # --- Backup (optional, cron-basiert) ---
  backup:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - ./backups:/backups
    entrypoint: /bin/sh
    command: >
      -c 'while true; do
        pg_dump -h db -U notfallqr notfallqr > /backups/notfallqr_$$(date +%Y%m%d_%H%M%S).sql;
        echo "Backup erstellt: $$(date)";
        find /backups -name "*.sql" -mtime +30 -delete;
        sleep 86400;
      done'
    restart: unless-stopped

volumes:
  postgres_data:
